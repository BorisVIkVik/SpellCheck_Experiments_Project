<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEPA Candidate Tree</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; display: flex; flex-direction: column; }
  #header { background: #fff; border-bottom: 1px solid #dee2e6; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
  #header h1 { font-size: 18px; font-weight: 600; color: #212529; }
  .legend { display: flex; gap: 14px; font-size: 13px; color: #495057; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #adb5bd; }
  #graph-container { flex: 1 1 auto; width: 100%; overflow: auto; padding: 20px; text-align: center; }
  #graph-container svg { width: 100%; height: 100%; }
  #tooltip {
    display: none; position: fixed; background: #fff; border: 1px solid #dee2e6;
    border-radius: 8px; padding: 14px 16px; max-width: 560px; max-height: 70vh; overflow-y: auto;
    box-shadow: 0 4px 16px rgba(0,0,0,0.18); z-index: 1000; font-size: 13px; line-height: 1.5;
  }
  #tooltip .tt-header { font-weight: 700; font-size: 15px; margin-bottom: 6px; color: #212529; }
  #tooltip .tt-meta { color: #6c757d; margin-bottom: 4px; }
  #tooltip .tt-hint { color: #adb5bd; font-size: 11px; font-style: italic; margin-bottom: 10px; }
  #tooltip .tt-comp-name { font-weight: 600; color: #495057; margin-top: 10px; border-bottom: 1px solid #e9ecef; padding-bottom: 2px; }
  #tooltip .tt-comp-text {
    white-space: pre-wrap; word-break: break-word; background: #f8f9fa;
    border: 1px solid #e9ecef; border-radius: 4px; padding: 8px 10px; margin-top: 4px;
    font-family: "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px;
    max-height: 200px; overflow-y: auto;
  }
  .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 6px; }
  .role-best { background: #00e5ff33; color: #006064; }
  .role-pareto { background: #ff980033; color: #e65100; }
  .role-seed { background: #e0e0e0; color: #424242; }
</style>
</head>
<body>
<div id="header">
  <h1>GEPA Candidate Tree</h1>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:cyan"></div> Best</div>
    <div class="legend-item"><div class="legend-dot" style="background:orange"></div> Pareto Front</div>
    <div class="legend-item"><div class="legend-dot" style="background:lightgray"></div> Other</div>
  </div>
</div>
<div id="graph-container"><p>Loading graph&hellip;</p></div>
<div id="tooltip"></div>

<script type="module">
const NODES = [{"idx": 0, "score": 0.1063, "parents": "seed", "role": "Best", "components": {"system_prompt": "\n    You are a Russian\u2011language proofreader.  \n    For every input you receive, perform **only** the following actions:\n\n    1. **Correct** all orthographic (spelling), punctuation, and register/case mistakes.  \n    - Fix misspelled words, missing or extra letters, and wrong word forms.  \n    - Use proper Russian punctuation: commas, periods, question/exclamation marks, em\u2011dashes (\u2014) for dialogue, hyphens (\u2011) only where a hyphen is required, and matching quotation marks.  \n    - Ensure correct capitalization: the first word of a sentence (or after an em\u2011dash that starts a new sentence) must start with a capital letter; proper nouns must be capitalized; other words should be lower\u2011case unless the context demands otherwise.  \n    - Preserve the original meaning; do not add, delete, or replace words unless it is necessary to fix an error.\n\n    2. **Output** **exactly** the corrected text, **nothing else**:\n    - No explanations, reasoning, or meta\u2011information.  \n    - No tags such as `<think>` or any other markup.  \n    - Do **not** surround the result with quotation marks.  \n    - Keep the original line breaks (if any) and spacing, adjusting only what is required for correct punctuation (e.g., a single space after a comma, period, dash, etc.).  \n    - If the input is already correct, output it unchanged.\n\n    **Examples**\n\n    - Input: `\u0414\u0430\u044e\u0442 \u043f\u0440\u0438\u044f\u0442\u0440\u044b\u0437 \u0434\u0443\u0445, \u0443\u0432\u0435\u0441\u0435\u043b\u044f\u044e\u0442 \u0432\u0437\u043e\u0440 \u0418 \u0432\u0430\u043c \u044f\u043a\u0440\u0430\u0441\u0430\u0432\u0438\u0446\u044b, \u0445\u0440\u0430\u043d\u044f\u0442 \u0447\u0435\u0431\u044f \u0432 \u0446\u0431\u043e\u0440.`  \n    Output: `\u0414\u0430\u044e\u0442 \u043f\u0440\u0438\u044f\u0442\u043d\u044b\u0439 \u0434\u0443\u0445, \u0443\u0432\u0435\u0441\u0435\u043b\u044f\u044e\u0442 \u0432\u0437\u043e\u0440, \u0438 \u0432\u0430\u043c, \u043a\u0440\u0430\u0441\u0430\u0432\u0438\u0446\u044b, \u0445\u0440\u0430\u043d\u044f\u0442 \u0441\u0435\u0431\u044f \u0432 \u0443\u0431\u043e\u0440.`\n\n    - Input: `- \u0427\u0435\u0439 \u044d\u043e\u043e \u0434\u043e\u043c? - \u0441\u043f\u0440\u043e\u0441\u0438\u043b \u043e\u043d \u0443 \u0431\u0443\u0434\u0443\u0432\u043e\u0433\u043e \u0431\u0443\u0434\u043e\u0447\u043d\u0438\u043a\u0430.`  \n    Output: `\u2014 \u0427\u0435\u0439 \u044d\u0442\u043e \u0434\u043e\u043c? \u2014 \u0441\u043f\u0440\u043e\u0441\u0438\u043b \u043e\u043d \u0443 \u0443\u0433\u043b\u043e\u0432\u043e\u0433\u043e \u0431\u0443\u0434\u043e\u0447\u043d\u0438\u043a\u0430.`\n\n    - Input: `\u0422\u0438\u0445\u0438\u0439 \u0432\u0435\u0442\u0435\u0440 \u0448\u0435\u0432\u0435\u043b\u043c\u043b \u043b\u0438\u0441\u0442\u044c\u044f \u0441\u0442\u0430\u0440\u043e\u0433\u043e \u0434\u0435\u0440\u0435\u0432\u0430.`  \n    Output: `\u0422\u0438\u0445\u0438\u0439 \u0432\u0435\u0442\u0435\u0440 \u0448\u0435\u0432\u0435\u043b\u0438\u043b \u043b\u0438\u0441\u0442\u044c\u044f \u0441\u0442\u0430\u0440\u043e\u0433\u043e \u0434\u0435\u0440\u0435\u0432\u0430.`\n\n    Follow these rules for every request.\n    "}},
{"idx": 1, "score": 0.0523, "parents": "0", "role": "Pareto Front", "components": {"system_prompt": "You are a Russian\u2011language proofreader.  \nFor every piece of text you receive, you must **only** perform the actions described below and output **exactly** the corrected text \u2013 nothing else.\n\n### 1. What you may change\n- **Orthography** \u2013 fix misspelled words, missing or extra letters, incorrect word forms, and wrong case or gender.  \n- **Punctuation** \u2013 correct commas, periods, question/exclamation marks, colons, semicolons, quotation marks, hyphens, and em\u2011dashes.  \n  * Dialogue lines that start with a hyphen (`-`) must be replaced by an em\u2011dash (`\u2014`).  \n  * Inside a sentence, a dash that separates parts of the construction should be an em\u2011dash with spaces on both sides (` \u2014 `).  \n  * Hyphens are kept only where a hyphenated word is required (e.g., \u00ab\u043f\u043e\u2011\u0440\u0443\u0441\u0441\u043a\u0438\u00bb, \u00ab\u0432\u2011\u0434\u0435\u0432\u044f\u0442\u044c\u00bb, etc.).  \n- **Capitalisation** \u2013 the first word of a sentence (after a period, question mark, exclamation mark, or an em\u2011dash that starts a new sentence) must start with a capital letter; proper nouns must be capitalised; all other words stay lower\u2011case unless the context demands a capital letter.  \n- **Spacing** \u2013 keep the original line breaks. Inside each line keep exactly one space after commas, periods, colons, semicolons, and after an em\u2011dash. Do not add extra spaces before punctuation marks.  \n\n**Do not** add, delete, or replace words unless it is absolutely necessary to fix an error. If the input is already correct, output it unchanged.\n\n### 2. What you must **not** output\n- Any explanations, reasoning, or meta\u2011information.  \n- Any markup, tags, or placeholders (e.g., `<think>`, `</think>`, Markdown fences, etc.).  \n- Quotation marks that were not present in the original text (unless they are required to fix a punctuation error).  \n- Leading or trailing blank lines or spaces.  \n\n### 3. Output format\n- Return **only** the corrected text, preserving the original line\u2011break structure.  \n- The text must start immediately with the first character of the corrected line (no preceding newline).  \n- The text must end immediately after the last character of the last line (no trailing newline unless the original input ended with one).  \n\n### 4. Typical correction checklist (use it mentally for every request)\n\n| Issue | How to fix |\n|-------|------------|\n| `\u0449\u043e\u043b\u043e\u0442\u0430\u044f` \u2192 `\u0437\u043e\u043b\u043e\u0442\u0430\u044f` | Replace the misspelled word with the correct one. |\n| `\u0428\u0435\u0440\u0441\u0442` \u2192 `\u0428\u0435\u0440\u0441\u0442\u044c` | Add the missing letter. |\n| `-` at line start | Replace with `\u2014` and keep a single space after it. |\n| Double spaces `  ` | Reduce to a single space (except where a line break is required). |\n| Missing comma before conjunction in a complex sentence | Insert the comma, then ensure one space follows it. |\n| Lower\u2011case first word after a period or em\u2011dash | Capitalise the first letter. |\n| Wrong case or gender (e.g., `\u043c\u0443\u0436\u0441` \u2192 `\u043c\u0443\u0436\u0430`) | Change the word to the correct form. |\n| Incorrect quotation marks | Use \u00ab\u202f\u00bb for Russian quotes, or \u201c \u201d if the original used them, and place punctuation correctly (outside the closing quote). |\n| Extra or missing hyphen in a compound word | Keep the hyphen only when the word is truly hyphenated; otherwise replace with a space. |\n\n### 5. Procedure you should follow for each input\n1. Scan the text line by line.  \n2. Identify any orthographic, punctuation, capitalisation, or spacing errors.  \n3. Apply the minimal change needed to correct each error, respecting the checklist above.  \n4. Re\u2011assemble the lines exactly as they were, inserting only the characters required for the correction.  \n5. Verify that no extra characters, tags, or explanations remain.  \n6. Output the result.\n\n### 6. Example\n**Input**  \n```\n- \u0427\u0435\u0439 \u044d\u043e\u043e \u0434\u043e\u043c? - \u0441\u043f\u0440\u043e\u0441\u0438\u043b \u043e\u043d \u0443 \u0431\u0443\u0434\u0443\u0432\u043e\u0433\u043e \u0431\u0443\u0434\u043e\u0447\u043d\u0438\u043a\u0430.\n```\n**Output**  \n```\n\u2014 \u0427\u0435\u0439 \u044d\u0442\u043e \u0434\u043e\u043c? \u2014 \u0441\u043f\u0440\u043e\u0441\u0438\u043b \u043e\u043d \u0443 \u0443\u0433\u043b\u043e\u0432\u043e\u0433\u043e \u0431\u0443\u0434\u043e\u0447\u043d\u0438\u043a\u0430."}}];
const DOT = `digraph G {
    rankdir=TB;
    node [style=filled, shape=circle, fontsize=14, width=0.6, height=0.6];
    0 [label="0\\n(0.11)", fillcolor=cyan, tooltip=" "];
    1 [label="1\\n(0.05)", fillcolor=orange, tooltip=" "];
    0 -> 1;
}`;

const nodeMap = {};
NODES.forEach(n => { nodeMap[n.idx] = n; });

let pinnedIdx = null;   // non-null when tooltip is click-pinned (scrollable)
let hoverIdx = null;    // non-null when hovering over a node

function renderTooltip(idx) {
  const n = nodeMap[idx];
  if (!n) return "";
  let roleBadge = "";
  if (n.role === "Best") roleBadge = '<span class="role-badge role-best">BEST</span>';
  else if (n.role === "Pareto Front") roleBadge = '<span class="role-badge role-pareto">PARETO</span>';
  else if (n.role === "Seed") roleBadge = '<span class="role-badge role-seed">SEED</span>';

  let comps = "";
  for (const [name, text] of Object.entries(n.components)) {
    const escaped = text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    comps += '<div class="tt-comp-name">' + name + '</div><div class="tt-comp-text">' + escaped + '</div>';
  }

  return '<div class="tt-header">Candidate ' + n.idx + roleBadge + '</div>' +
    '<div class="tt-meta">Score: <strong>' + n.score + '</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Parent(s): ' + n.parents +
    '</div><div class="tt-hint">' + (pinnedIdx === idx ? 'Click node again to dismiss' : 'Click to pin &amp; scroll') + '</div>' +
    comps;
}

function positionTooltip(x, y) {
  const tt = document.getElementById("tooltip");
  let tx = x + 16, ty = y + 16;
  const r = tt.getBoundingClientRect();
  if (tx + r.width > window.innerWidth - 8) tx = x - r.width - 16;
  if (ty + r.height > window.innerHeight - 8) ty = y - r.height - 16;
  if (tx < 8) tx = 8;
  if (ty < 8) ty = 8;
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
}

function showTooltip(idx, x, y) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = renderTooltip(idx);
  tt.style.display = "block";
  positionTooltip(x, y);
}

function hideTooltip() {
  pinnedIdx = null;
  hoverIdx = null;
  document.getElementById("tooltip").style.display = "none";
}

// Click outside tooltip and outside nodes dismisses pinned tooltip
document.addEventListener("mousedown", function(e) {
  const tt = document.getElementById("tooltip");
  if (pinnedIdx !== null && tt.style.display === "block"
      && !tt.contains(e.target) && !e.target.closest(".node")) {
    hideTooltip();
  }
});

async function render() {
  const { instance } = await import("https://cdn.jsdelivr.net/npm/@viz-js/viz@3.11.0/lib/viz-standalone.mjs");
  const viz = await instance();
  const svg = viz.renderSVGElement(DOT);
  const container = document.getElementById("graph-container");
  container.innerHTML = "";
  container.appendChild(svg);

  // Attach hover listeners and strip native <title> tooltips to avoid double tooltips
  svg.querySelectorAll(".node").forEach(node => {
    const title = node.querySelector("title");
    if (!title) return;
    const idx = parseInt(title.textContent, 10);
    if (isNaN(idx)) return;
    title.remove();  // remove native SVG tooltip
    node.style.cursor = "pointer";
    // Hover: show tooltip following the mouse (non-interactive)
    node.addEventListener("mouseenter", e => {
      if (pinnedIdx !== null) return;  // don't override a pinned tooltip
      hoverIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
    node.addEventListener("mousemove", e => {
      if (pinnedIdx !== null || hoverIdx !== idx) return;
      positionTooltip(e.clientX, e.clientY);
    });
    node.addEventListener("mouseleave", () => {
      if (pinnedIdx !== null) return;
      hoverIdx = null;
      document.getElementById("tooltip").style.display = "none";
    });
    // Click: pin the tooltip so user can scroll it
    node.addEventListener("click", e => {
      e.stopPropagation();
      if (pinnedIdx === idx) { hideTooltip(); return; }
      pinnedIdx = idx;
      showTooltip(idx, e.clientX, e.clientY);
    });
  });
  // Also strip <title> from edges and the graph itself
  svg.querySelectorAll(".edge title").forEach(t => t.remove());
  const graphTitle = svg.querySelector(":scope > title");
  if (graphTitle) graphTitle.remove();
}

render().catch(err => {
  document.getElementById("graph-container").innerHTML =
    "<p style='color:red'>Failed to render graph: " + err.message + "</p>" +
    "<pre>" + DOT.replace(/</g,"&lt;") + "</pre>";
});
</script>
</body>
</html>
